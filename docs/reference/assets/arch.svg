<svg xmlns="http://www.w3.org/2000/svg" width="1150" height="650" viewBox="0 0 1150 650">
<defs>
  <marker id="arrow" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto" markerUnits="strokeWidth">
    <path d="M0,0 L0,6 L9,3 z" fill="#596579"/>
  </marker>
</defs>
<style>
text{font-family:Arial,"Noto Sans CJK SC","Microsoft YaHei",sans-serif;fill:#172033}
.title{font-size:28px;font-weight:700}.h{font-size:20px;font-weight:700}.t{font-size:16px}.s{font-size:14px}.mono{font-family:Menlo,Consolas,monospace;font-size:15px}
.box{fill:#f8fafc;stroke:#5b6b8c;stroke-width:2}.blue{fill:#e8f0ff;stroke:#4978c7;stroke-width:2}.green{fill:#e9f8ef;stroke:#3c8a5a;stroke-width:2}.orange{fill:#fff3e3;stroke:#c97820;stroke-width:2}.red{fill:#fff0f1;stroke:#c64b55;stroke-width:2}.purple{fill:#f3edff;stroke:#7855b5;stroke-width:2}.gray{fill:#eef1f5;stroke:#7b879a;stroke-width:2}
.line{stroke:#596579;stroke-width:2;fill:none}.arrow{stroke:#596579;stroke-width:2;fill:none;marker-end:url(#arrow)}.dash{stroke-dasharray:7 6}.thin{stroke-width:1.5}
</style>
<rect width="100%" height="100%" fill="#ffffff"/>

<text x="575" y="42" text-anchor="middle" class="title">献血管理系统总体架构</text>

<rect x="220" y="78" width="710" height="86" rx="14" class="blue"/>
<text x="575" y="114" text-anchor="middle" class="h">Java Application</text>
<text x="575" y="144" text-anchor="middle" class="mono">JDBC / MongoDB Driver</text>

<path d="M575 164 V205" class="arrow"/>

<rect x="115" y="205" width="920" height="190" rx="14" class="purple"/>
<text x="575" y="245" text-anchor="middle" class="h">数据访问层</text>
<text x="575" y="276" text-anchor="middle" class="t">DAO Pattern：统一封装数据库访问</text>

<rect x="205" y="310" width="320" height="70" rx="14" class="green"/>
<text x="365" y="338" text-anchor="middle" class="h">MySQL DAO</text>
<text x="365" y="364" text-anchor="middle" class="mono">PreparedStatement / Transaction</text>

<rect x="625" y="310" width="320" height="70" rx="14" class="orange"/>
<text x="785" y="338" text-anchor="middle" class="h">MongoDB DAO</text>
<text x="785" y="364" text-anchor="middle" class="mono">Document / Aggregation</text>

<path d="M365 380 V435" class="arrow"/>
<path d="M785 380 V435" class="arrow"/>

<rect x="95" y="435" width="500" height="115" rx="14" class="green"/>
<text x="345" y="473" text-anchor="middle" class="h">MySQL 8.0</text>
<text x="345" y="503" text-anchor="middle" class="t">用户、权限、核心业务、订单记录</text>
<text x="345" y="529" text-anchor="middle" class="s">关系型核心数据，保证事务与一致性</text>

<rect x="655" y="435" width="400" height="115" rx="14" class="orange"/>
<text x="855" y="473" text-anchor="middle" class="h">MongoDB 5.0</text>
<text x="855" y="503" text-anchor="middle" class="t">行为日志、评论、业务详情、系统日志</text>
<text x="855" y="529" text-anchor="middle" class="s">文档型扩展数据，适合高写入与聚合</text>

<path d="M525 500 C570 500 605 500 655 500" class="line dash"/>
<text x="575" y="490" text-anchor="middle" class="s">ID 引用</text>

<rect x="220" y="585" width="710" height="42" rx="12" class="gray"/>
<text x="575" y="612" text-anchor="middle" class="t">核心业务落 MySQL，日志与半结构化内容落 MongoDB，应用层通过 DAO 隔离访问细节。</text>
</svg>
